name: Fetch Substack RSS
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch RSS and save as JSON
        run: |
          curl -s "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fcocoaworksra.substack.com%2Ffeed&count=5" > feed.json
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feed.json
          git diff --staged --quiet || git commit -m "Update RSS feed"
          git push
